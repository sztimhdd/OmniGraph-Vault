# databricks-deploy/app.yaml — kdb-2-04 + kb-v2.2-7 production deploy artifact.
#
# Layout (Wave 0 confirmed 2026-05-20 + 2-pass-sync update 2026-05-20):
#   /app/python/source_code/         = source_code_path contents = databricks-deploy/
#   /app/python/source_code/kb/      = synced from project-root kb/ (2-pass sync)
#   /app/python/source_code/requirements.txt = pip-install target
#
# So `import kb.api` resolves natively at /app/python/source_code/ (default sys.path).
# No PYTHONPATH gymnastics, no app_runner.py shim, no app_minimal.py stub —
# directly invoke uvicorn against the real kb.api:app.

command:
  - bash
  - -c
  - "python _db_bootstrap.py && exec uvicorn app_entry:app --host 0.0.0.0 --port $DATABRICKS_APP_PORT"

env:
  # OmniGraph runtime data root (writable scratch on Databricks Apps container)
  - name: OMNIGRAPH_BASE_DIR
    value: "/tmp/omnigraph_vault"

  # UC Volume source for the read-only KB DB. NOT auto-FUSE-mounted in
  # Databricks Apps runtime — _db_bootstrap.py downloads via Files API
  # to KB_DB_PATH at boot using the app SP's READ VOLUME grant.
  - name: KB_VOLUME_DB_PATH
    value: "/Volumes/mdlg_ai_shared/kb_v2/omnigraph_vault/data/kol_scan.db"

  # Local /tmp target where _db_bootstrap.py writes the hydrated DB.
  # kb.config and all sqlite3 connections read this path at runtime.
  - name: KB_DB_PATH
    value: "/tmp/kol_scan.db"

  # kb-v2.2-7: EDC internal users prefer English; Aliyun stays default zh-CN
  - name: KB_DEFAULT_LANG
    value: "en"

  # Phase-5 transitive-import guard (lib/__init__.py imports deepseek_model_complete
  # eagerly; a non-empty value prevents ImportError at boot. Real DeepSeek calls
  # never fire in this deploy — synthesize is gated to Databricks serving).
  - name: DEEPSEEK_API_KEY
    value: "dummy"

  # Synthesize/KG path config (deferred-imported inside /api/synthesize handler;
  # /health, /api/articles, /api/search?mode=fts work without these reaching out)
  - name: OMNIGRAPH_LLM_PROVIDER
    value: "databricks_serving"

  - name: KB_LLM_MODEL
    value: "databricks-claude-sonnet-4-6"

  # arx-2: Vertex AI SA for 3072-dim embedding (unconditional; Aliyun storage canonical)
  - name: GOOGLE_APPLICATION_CREDENTIALS
    value: "/tmp/omnigraph_vault/gcp-paid-sa.json"

  - name: GOOGLE_CLOUD_PROJECT
    value: "project-df08084f-6db8-4f04-be8"

  - name: GOOGLE_CLOUD_LOCATION
    value: "global"

  - name: KB_VOLUME_GCP_SA_PATH
    value: "/Volumes/mdlg_ai_shared/kb_v2/omnigraph_vault/gcp-paid-sa.json"

  - name: KB_KG_GCP_SA_KEY_PATH
    value: "/tmp/omnigraph_vault/gcp-paid-sa.json"

  # kdb-3 LightRAG storage hydration (UC volume → /tmp at boot).
  # _db_bootstrap.py mirrors the dir via SDK Files API; RAG_WORKING_DIR is
  # the local target consumed by config.py + kg_synthesize.py LightRAG init.
  - name: KB_VOLUME_LIGHTRAG_DIR
    value: "/Volumes/mdlg_ai_shared/kb_v2/omnigraph_vault/lightrag_storage"

  - name: RAG_WORKING_DIR
    value: "/tmp/omnigraph_vault/lightrag_storage"

  # kdb-images-fix: hydrate UC volume images → /tmp at boot.
  # /static/img mount in kb/api.py reads from KB_IMAGES_DIR; without this
  # the path does not exist in the Databricks Apps container and every
  # image request 404s. Volume layout: <root>/<article_hash>/<N>.jpg.
  - name: KB_VOLUME_IMAGES_DIR
    value: "/Volumes/mdlg_ai_shared/kb_v2/omnigraph_vault/images"

  - name: KB_IMAGES_DIR
    value: "/tmp/omnigraph_vault/images"

  # 260525-c1-fix-A: outer C1 wait_for budget. Code default is 60s
  # (kb/services/synthesize.py:69) which preempts long_form hybrid queries
  # at t=60s on the Databricks runtime — observed in
  # .scratch/260525-kdb-smoke-longform.log (poll_at_60.6s=running →
  # poll_at_63.4s=done, wallclock 64.19s, error="C1 timeout"). Mirrors
  # Aliyun's /etc/systemd/system/kb-api.service.d/override.conf value
  # validated since 260517-lok. Diagnosis:
  # .planning/quick/260525-c1-no-content-at-64s/REPORT.md
  - name: KB_SYNTHESIZE_TIMEOUT
    value: "240"

  # arx-2-bump180: outer KG-search worker asyncio.wait_for budget. Code
  # default 90s (kb/api_routers/search.py:41) hit boundary-precise 90.00s
  # wallclock on post-arx-2 dim-fix redeploy — KG retrieval pipeline
  # completed (Final context: 40 ent / 143 rel / 13 chunks) but Vertex
  # Gemini synth ~31s after context-build pushed total worker runtime past
  # the 90s default. Empty exception str confirms asyncio.TimeoutError.
  # Evidence: .scratch/260525-kg-pending/tail-nofilter.log:472 (start),
  # :524 (fail). 180s gives ~2x synth headroom.
  # Diagnosis: .planning/quick/20260525-200047-synthesize-audit/AUDIT.md
  - name: KB_KG_SEARCH_TIMEOUT
    value: "180"

  # v1.1.P2-3-perf-fix-A: LLM-as-reranker (Databricks Haiku batch JSON).
  # Replaces P2-3 BGE-v2-m3 in-process cross-encoder (eliminated CPU rerank
  # latency root cause: ~160s on N=131 chunks at 8GB CPU). The reranker is
  # now a 1-call Haiku batch JSON over top-30 chunks (~6K-token prompt,
  # ~5-15s wall). Provider dispatch via lib/llm_rerank.py mirrors
  # lib/llm_complete.py pattern. See P2-3-perf-fix-A-VERIFICATION.md.
  - name: OMNIGRAPH_LLM_RERANK_PROVIDER
    value: "databricks_serving"

  - name: OMNIGRAPH_LLM_RERANK_MODEL
    value: "databricks-claude-haiku-4-5"

  - name: OMNIGRAPH_LLM_RERANK_TOP_K
    value: "30"

  - name: OMNIGRAPH_LLM_RERANK_TIMEOUT
    value: "20"

  # SC#6: graceful degrade env. Set to "1" to disable rerank at runtime
  # without code change (KG paths fall back to mode='hybrid', P5 baseline).
  # Legacy BGE_FORCE_LOAD_FAIL is also honored by kb/api.py:_build_llm_rerank
  # for rollback compat (deprecated post-A; remove in v1.2).
  # - name: OMNIGRAPH_LLM_RERANK_FORCE_FAIL
  #   value: "0"

  # arx-2-finish: Tavily API key for the research web_baseline + verifier
  # web_search tools. Sourced from the kb-translate secret scope (key
  # omnigraph_research_tavily_key) via the `tavily-key` resource below —
  # NEVER plaintext here (app.yaml is git-tracked + public). With this set,
  # web_baseline runs instead of emitting status="skipped (TAVILY_API_KEY unset)".
  - name: TAVILY_API_KEY
    valueFrom: tavily-key

# arx-2-finish: app resource bindings. The Databricks Apps runtime resolves
# each `env.valueFrom: <name>` against a same-named resource here. The app SP
# (459ebc59-...) was granted READ on the kb-translate scope. Secret value is
# never stored in this file — only the scope/key reference.
resources:
  - name: tavily-key
    secret:
      scope: kb-translate
      key: omnigraph_research_tavily_key
      permission: READ
