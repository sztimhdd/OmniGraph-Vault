# databricks-deploy/app.yaml — kdb-2-04 production deploy artifact.
#
# Wave 0 confirmed layout (2026-05-20): /app/python/source_code/ = source root.
# kb/ + startup_adapter.py deployed in workspace databricks-deploy/ subdirectory.
# PYTHONPATH must include both source root AND databricks-deploy/ subdirectory.

command:
  - python
  - app_runner.py

env:
  # Databricks Apps system environment variables
  - name: PYTHONPATH
    value: "/app/python/source_code:/app/python/source_code/databricks-deploy"

  - name: UVICORN_HOST
    value: "0.0.0.0"

  - name: UVICORN_PORT
    value: "8080"

  # OmniGraph application variables
  - name: OMNIGRAPH_BASE_DIR
    value: "/tmp/omnigraph_vault"

  - name: OMNIGRAPH_LLM_PROVIDER
    value: "databricks_serving"

  - name: KB_LLM_MODEL
    value: "databricks-claude-sonnet-4-6"

  - name: KB_EMBEDDING_MODEL
    value: "databricks-qwen3-embedding-0-6b"

  - name: KB_DB_PATH
    value: "/tmp/omnigraph_vault/data/kol_scan.db"

  - name: DEEPSEEK_API_KEY
    value: "dummy"
